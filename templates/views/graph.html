<div class="panel-grid">
  <section class="card span-12">
    <div class="section-kicker">资源边界</div>
    <h2>资源、授权与执行路径</h2>
    <p class="card-subtitle">查看资源范围、授权规则和系统内的执行关系。</p>
    <div class="result-note compact-top">
      <strong>当前任务</strong>
      <p>${graph_runtime_hint}</p>
    </div>
    ${relationship_graph}
  </section>

  <section class="card span-12">
    <div class="section-kicker">资源目录</div>
    <h2>按类别查看资源</h2>
    <p class="card-subtitle">每个资源类别单独占据一行，便于核对边界与权限范围。</p>
    <div class="resource-category-stack">
      ${resource_category_sections}
    </div>
  </section>

  <section class="card span-12">
    <div class="section-kicker">最小权限原则</div>
    <h2>智能体最小权限</h2>
    <p class="card-subtitle">展示 4 个智能体的职责边界与默认限制。</p>
    <div class="scope-grid">
      ${agent_scope_cards}
    </div>
  </section>

  <section class="card span-12">
    <div class="section-kicker">授权规则</div>
    <h2>初始授权</h2>
    <p class="card-subtitle">查看根权限和可签发委托的范围。</p>
    <div class="table-wrap">
      <table class="wide-table policy-table">
        <thead>
          <tr>
            <th>主体</th>
            <th>动作</th>
            <th>资源</th>
            <th>类型</th>
            <th>敏感级别</th>
            <th>效果</th>
          </tr>
        </thead>
        <tbody>
          ${policy_rows}
        </tbody>
      </table>
    </div>
  </section>
</div>
